version: 2

project_name: nn

before:
  hooks:
    - go mod tidy

builds:
  - id: nn
    main: ./cmd/nn
    binary: nn
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: nn
    name_template: "nn_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "nn_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: nn
    repository:
      owner: jaresty
      name: homebrew-nn
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/jaresty/nn
    description: "LLM-driven Zettelkasten CLI"
    license: MIT

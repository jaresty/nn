name: autotag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  autotag:
    runs-on: ubuntu-latest
    # Only run after tests pass — we call the test job inline so this is
    # a single workflow. If tests fail, the tag step is skipped.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          default_bump: false          # don't tag if no conventional commit found
          release_branches: main
          tag_prefix: v
          # Conventional commit → semver mapping:
          #   feat:      → minor
          #   fix:       → patch
          #   feat!:     → major
          #   BREAKING CHANGE in footer → major
          # Commits with only chore:/docs:/ci: prefixes produce no tag.
